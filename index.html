<html>
  <head>
    <title>Bookhub </title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0;" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    
    <div class="navbar">
      <h1>Bookhub</h1>
    </div>
    <div class="container">
      <div class="book-container">
        <h2>Harish Diaries</h2>
        <h5>Harish</h5>
        <p>This is a webpage created by me, I know its a small thing, but you know wise people says "Start it small", So yeah! Hope you like it you can also add your books here if you want just click the + button on the right bottom.. see yall! </p>
        <button onclick="delet(event);"> Delete</button>
      </div>
    </div>
    <div class="popupoverlay"></div>
    <div class="popupbox">
      <h2>Add Book</h2>
      <form>
        <input id="Book-title-input" placeholder="Book Title" type="text" />
        <input id="Book-author-input" placeholder="Book Author" type="text" />
        <textarea
          id="Book-description-input"
          placeholder="Short Description"
          type="text"
        ></textarea>
        <button id="addbook">Add</button>
        <button id="cancelpopup">Cancel</button>
      </form>
    </div>
    <button class="add-button" id="add-popup-button">+</button>
    <script src="script.js"></script>
  </body>
</html>
